server.port=8080

# Profile Configuration (Loads application-local.properties locally)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Database configurations (Change credentials as needed)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/anydraw?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA and Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configurations (Change secret for production)
jwt.secret=${JWT_SECRET:}
jwt.expiration=86400000